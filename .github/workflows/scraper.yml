name: Scrape Reviews

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual trigger from the Actions tab

permissions:
  contents: write             # needed to push the committed files back

jobs:
  scrape:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser + system deps
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "eqafarena"
          git config user.email "eqafarena@sflcompanies.com"
          git add output.txt README.md log.txt
          git diff --staged --quiet || git commit -m "chore: scrape run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
